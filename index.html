<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>SyncParty</title><link rel="stylesheet" href="css/styles.css"><meta name="theme-color" content="#0a0a0f"><style>body{background:linear-gradient(180deg,#0a0a0f,#12121f 40%,#0a0a0f);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:24px;position:relative;overflow:hidden}.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;animation:pulse 6s ease-in-out infinite;pointer-events:none}.orb-1{width:300px;height:300px;background:radial-gradient(circle,#FF006E,transparent 70%);top:10%;left:-10%}.orb-2{width:250px;height:250px;background:radial-gradient(circle,#8338EC,transparent 70%);bottom:15%;right:-8%;animation-delay:2s}.title{font-size:48px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#FF006E,#8338EC,#3A86FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.tagline{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:#555;margin-top:6px}.btn-host{width:100%;max-width:320px;padding:18px 24px;border-radius:16px;border:1px solid rgba(255,0,110,.3);background:linear-gradient(135deg,rgba(255,0,110,.2),rgba(131,56,236,.15));color:#fff;font-size:16px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;letter-spacing:3px;transition:transform .15s}.btn-host:active{transform:scale(.97)}.divider{display:flex;align-items:center;gap:16px;width:100%;max-width:320px;margin:16px 0}.divider-line{flex:1;height:1px;background:rgba(255,255,255,.08)}.divider-text{font-size:11px;color:#444;letter-spacing:3px}.join-row{display:flex;gap:8px;width:100%;max-width:320px}.join-input{flex:1;padding:16px 20px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:18px;font-weight:800;font-family:'Outfit',sans-serif;letter-spacing:8px;text-align:center;outline:none}.join-input:focus{border-color:rgba(131,56,236,.5)}.join-input::placeholder{color:#333;letter-spacing:4px;font-weight:400}.btn-join{padding:16px 20px;border-radius:12px;border:1px solid rgba(58,134,255,.3);background:linear-gradient(135deg,rgba(58,134,255,.2),rgba(131,56,236,.15));color:#3A86FF;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer}.error{font-size:12px;color:#FF006E;margin-top:8px;text-align:center}.hint{position:absolute;bottom:24px;font-size:10px;color:#333;letter-spacing:2px;text-align:center}.loading{display:none;font-size:13px;color:#888;margin-top:12px}</style></head><body><div class="orb orb-1"></div><div class="orb orb-2"></div><div style="text-align:center;margin-bottom:48px;animation:slideUp .6s ease-out"><div class="title">SyncParty</div><div class="tagline">Every phone becomes the show</div></div><button class="btn-host" id="btnHost" style="animation:slideUp .7s ease-out">HOST A SHOW</button><div id="loading" class="loading">Creating room...</div><div class="divider" style="animation:slideUp .8s ease-out"><div class="divider-line"></div><span class="divider-text">OR JOIN</span><div class="divider-line"></div></div><div class="join-row" style="animation:slideUp .9s ease-out"><input type="text" class="join-input" id="joinCode" placeholder="CODE" maxlength="4" autocomplete="off" autocapitalize="characters" spellcheck="false"><button class="btn-join" id="btnJoin">JOIN</button></div><div id="error" class="error"></div><div class="hint">OPEN HOST ON ONE DEVICE — SHARE CODE WITH FRIENDS</div><script type="module">import{SyncEngine}from'./js/sync-engine.js';const btnHost=document.getElementById('btnHost'),btnJoin=document.getElementById('btnJoin'),joinCode=document.getElementById('joinCode'),errorEl=document.getElementById('error'),loadingEl=document.getElementById('loading');joinCode.addEventListener('input',()=>{joinCode.value=joinCode.value.toUpperCase().replace(/[^A-Z0-9]/g,'');errorEl.textContent='';});btnHost.addEventListener('click',async()=>{btnHost.disabled=true;loadingEl.style.display='block';errorEl.textContent='';try{const e=new SyncEngine;const c=await e.createRoom();window.location.href='host.html?room='+c}catch(e){errorEl.textContent='Failed to create room.';console.error(e);btnHost.disabled=false;loadingEl.style.display='none'}});function doJoin(){const c=joinCode.value.trim().toUpperCase();if(c.length!==4){errorEl.textContent='Enter a 4-letter room code';return}window.location.href='crowd.html?room='+c}btnJoin.addEventListener('click',doJoin);joinCode.addEventListener('keydown',e=>{if(e.key==='Enter')doJoin()});</script></body></html>
