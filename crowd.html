<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>SyncParty</title><link rel="stylesheet" href="css/styles.css"><meta name="theme-color" content="#000"><style>body{margin:0;padding:0;overflow:hidden;position:fixed;inset:0;background:#000;transition:background-color .08s linear}#onboarding{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;transition:background-color .18s ease;z-index:100}.ob-title{font-size:44px;font-weight:900;background:linear-gradient(135deg,#FF006E,#8338EC,#3A86FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.ob-sub{font-size:15px;color:rgba(255,255,255,.65);font-weight:300}.ob-number{width:76px;height:76px;border-radius:50%;border:2px solid rgba(255,0,110,.4);display:flex;align-items:center;justify-content:center;animation:glow 2s ease-in-out infinite;margin-bottom:12px}.ob-number span{font-size:26px;font-weight:900;color:#FF006E}.ob-tap{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;background:linear-gradient(90deg,rgba(255,255,255,.1),rgba(255,255,255,.3),rgba(255,255,255,.1));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}#msgOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;pointer-events:none}#msgOverlay.show{display:flex}.msg-bubble{padding:14px 24px;border-radius:18px;max-width:85%;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(16px);text-align:center;animation:popIn .35s ease-out}.msg-bubble.shoutout{padding:22px 32px;background:linear-gradient(135deg,rgba(255,215,0,.25),rgba(255,20,147,.15));border:2px solid rgba(255,215,0,.5)}.msg-text{font-size:18px;font-weight:800;color:#fff}.msg-bubble.shoutout .msg-text{font-size:26px;color:#FFD700}.msg-from{font-size:9px;color:rgba(255,215,0,.5);letter-spacing:4px;text-transform:uppercase;margin-top:6px}#errorScreen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;color:#fff;z-index:300;text-align:center;padding:24px}#brightnessPrompt{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle,#1a1208 0%,#000 70%);z-index:150;padding:24px;text-align:center;animation:fadeIn .5s ease-out}#brightnessPrompt.show{display:flex}.bp-icon{width:80px;height:80px;color:#F4D03F;filter:drop-shadow(0 0 24px rgba(244,208,63,.7));margin-bottom:28px;animation:bpSunGlow 2.4s ease-in-out infinite}@keyframes bpSunGlow{0%,100%{filter:drop-shadow(0 0 18px rgba(244,208,63,.5))}50%{filter:drop-shadow(0 0 32px rgba(244,208,63,.9))}}.bp-headline{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:14px}.bp-subhead{font-family:'Outfit',sans-serif;font-size:14px;font-weight:400;color:rgba(255,255,255,.7);max-width:280px;text-align:center;line-height:1.5;margin-bottom:28px}.bp-bar{width:200px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:28px}.bp-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#F4D03F,#FFD700);border-radius:2px;transition:width 2s ease-out;box-shadow:0 0 10px rgba(244,208,63,.6)}.bp-bar-fill.fill{width:100%}.bp-button{font-family:'Outfit',sans-serif;padding:14px 30px;font-size:14px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#F4D03F;background:transparent;border:2px solid #F4D03F;border-radius:4px;cursor:pointer;opacity:0;transition:opacity .5s ease,background .2s ease;-webkit-tap-highlight-color:transparent}.bp-button.show{opacity:1}.bp-button:active{background:rgba(244,208,63,.15)}</style></head><body oncontextmenu="return false"><div id="errorScreen"><div style="font-size:48px;margin-bottom:16px">😵</div><div style="font-size:18px;font-weight:700;margin-bottom:8px" id="errorTitle">Room not found</div><div style="font-size:13px;color:#888" id="errorMsg">Check your room code and try again.</div><a href="index.html" style="margin-top:24px;color:#3A86FF;font-size:14px;font-weight:600;text-decoration:none">← Back</a></div><div id="onboarding"><div id="obContent" style="text-align:center;animation:fadeUp .7s ease-out"></div></div><div id="msgOverlay"><div class="msg-bubble" id="msgBubble"><div class="msg-text" id="msgText"></div><div class="msg-from" id="msgFrom" style="display:none">FROM THE DJ</div></div></div><div id="brightnessPrompt"><svg class="bp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4" fill="currentColor"></circle><line x1="12" y1="2" x2="12" y2="5"></line><line x1="12" y1="19" x2="12" y2="22"></line><line x1="2" y1="12" x2="5" y2="12"></line><line x1="19" y1="12" x2="22" y2="12"></line><line x1="4.5" y1="4.5" x2="6.6" y2="6.6"></line><line x1="17.4" y1="17.4" x2="19.5" y2="19.5"></line><line x1="4.5" y1="19.5" x2="6.6" y2="17.4"></line><line x1="17.4" y1="6.6" x2="19.5" y2="4.5"></line></svg><div class="bp-headline" id="bpHeadline">Turn Your Brightness Up</div><div class="bp-subhead" id="bpSubhead"></div><div class="bp-bar"><div class="bp-bar-fill" id="bpBarFill"></div></div><button class="bp-button" id="bpButton" type="button">I'm Ready</button></div><script type="module">import{SyncEngine}from'./js/sync-engine.js';import{getColor}from'./js/patterns.js';const params=new URLSearchParams(window.location.search);const roomCode=params.get('room')?.toUpperCase();if(!roomCode||roomCode.length!==4){document.getElementById('errorScreen').style.display='flex'}let engine=null,patState={pattern:'solid',theme:'neon',bpm:120,startTime:Date.now()},spotlit=false,spotTimer=null,animFrame=null,msgTimer=null,deviceNumber=0,totalDevices=0;const obEl=document.getElementById('onboarding'),obContent=document.getElementById('obContent');function onboardPhase0(){obContent.innerHTML='<div class="ob-title">SyncParty</div><div class="ob-sub">Your phone is now part of the show</div>'}function onboardPhase1(){obContent.innerHTML='<div style="font-size:56px;margin-bottom:12px">✨</div><div style="font-size:13px;color:rgba(255,255,255,.85);letter-spacing:4px;text-transform:uppercase">Get ready...</div>';const colors=['#FF006E','#8338EC','#3A86FF','#06D6A0','#FFD700','#FF4500','#00FFFF'];let step=0;const iv=setInterval(()=>{obEl.style.backgroundColor=colors[step%colors.length];step++;if(step>10){clearInterval(iv);obEl.style.backgroundColor='#000';advanceFromPhase1()}},250)}const BRIGHTNESS_COPY=['Turn your brightness up. All the way. You\'re about to be part of the first ever crowd light show.','Crank your brightness to max. The show only works if every screen shines.','Brightness all the way up. You\'re one of a thousand lights tonight.'];let bp15State={advanced:false,autoTimer:null,buttonTimer:null};function advanceFromPhase1(){if(sessionStorage.getItem('sp_brightness_acked')==='1'){advanceToPhase2();return}onboardPhase15()}function onboardPhase15(){const bp=document.getElementById('brightnessPrompt'),bar=document.getElementById('bpBarFill'),btn=document.getElementById('bpButton'),sub=document.getElementById('bpSubhead'),head=document.getElementById('bpHeadline');obEl.style.display='none';head.textContent='Turn Your Brightness Up';sub.textContent=BRIGHTNESS_COPY[Math.floor(Math.random()*BRIGHTNESS_COPY.length)];bar.classList.remove('fill');btn.classList.remove('show');bp.classList.add('show');requestAnimationFrame(()=>requestAnimationFrame(()=>bar.classList.add('fill')));bp15State.buttonTimer=setTimeout(()=>btn.classList.add('show'),2100);const ack=()=>{if(bp15State.advanced)return;bp15State.advanced=true;clearTimeout(bp15State.autoTimer);clearTimeout(bp15State.buttonTimer);sessionStorage.setItem('sp_brightness_acked','1');bp.classList.remove('show');advanceToPhase2()};btn.onclick=ack;bp15State.autoTimer=setTimeout(()=>{if(bp15State.advanced)return;head.textContent='Ready When You Are';sub.textContent='';btn.classList.add('show');setTimeout(ack,1500)},12000)}async function advanceToPhase2(){obEl.style.display='flex';obEl.style.backgroundColor='#000';await connectPromise;onboardPhase2()}function onboardPhase2(){obContent.style.animation='fadeUp .6s ease-out';obContent.innerHTML='<div class="ob-number"><span>#'+(deviceNumber||'?')+'</span></div><div style="font-size:12px;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase">Light '+deviceNumber+' of '+(totalDevices||'...')+'</div><div style="font-size:15px;color:#fff;font-weight:600;margin:12px 0 20px">You\'re connected!</div><div class="ob-tap">Tap anywhere to go fullscreen</div>';obEl.style.cursor='pointer';obEl.onclick=enterLightMode}function enterLightMode(){obEl.style.display='none';try{document.documentElement.requestFullscreen?.()}catch(e){}try{navigator.wakeLock?.request('screen')}catch(e){}startAnimation()}function startAnimation(){function frame(){if(!spotlit){const color=getColor(patState.pattern,patState.theme,patState.bpm,patState.startTime);document.body.style.backgroundColor=color;document.body.style.transition=patState.pattern==='strobe'?'none':'background-color .08s linear'}animFrame=requestAnimationFrame(frame)}animFrame=requestAnimationFrame(frame)}function showMsg(text,kind){const o=document.getElementById('msgOverlay'),b=document.getElementById('msgBubble'),t=document.getElementById('msgText'),f=document.getElementById('msgFrom');t.textContent=text;b.className=kind==='shoutout'?'msg-bubble shoutout':'msg-bubble';f.style.display=kind==='shoutout'?'block':'none';o.classList.add('show');if(msgTimer)clearTimeout(msgTimer);msgTimer=setTimeout(()=>o.classList.remove('show'),3500)}async function connect(){try{engine=new SyncEngine;engine.onMessage=(event,data)=>{switch(event){case'sync':patState={pattern:data.pattern,theme:data.theme,bpm:data.bpm,startTime:data.startTime};break;case'flash':document.body.style.transition='none';document.body.style.backgroundColor='#FFF';setTimeout(()=>{document.body.style.backgroundColor='#000'},100);break;case'blackout':patState={...patState,pattern:'solid'};document.body.style.backgroundColor='#000';spotlit=false;break;case'message':showMsg(data.text,data.msgKind||'instruction');break;case'spotlight':if(data.target===engine.deviceId){spotlit=true;document.body.style.transition='background-color .3s ease';document.body.style.backgroundColor=data.color||'#FFD700';showMsg('SPOTLIGHT ON YOU','shoutout');if(spotTimer)clearTimeout(spotTimer);spotTimer=setTimeout(()=>{spotlit=false},data.duration||5000)}break;case'shoutout':if(data.target===engine.deviceId)showMsg(data.text,'shoutout');break;case'device_count':totalDevices=data.total;break}};const result=await engine.joinRoom(roomCode);deviceNumber=result.deviceNumber;totalDevices=deviceNumber}catch(e){console.error('Join failed:',e);document.getElementById('errorScreen').style.display='flex';document.getElementById('errorMsg').textContent='Could not find room "'+roomCode+'".'}}let connectPromise=null;async function boot(){onboardPhase0();connectPromise=connect();setTimeout(()=>onboardPhase1(),2500)}if(roomCode)boot();</script></body></html>
