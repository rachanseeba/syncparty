<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>SyncParty</title><link rel="stylesheet" href="css/styles.css"><meta name="theme-color" content="#000"><style>body{margin:0;padding:0;overflow:hidden;position:fixed;inset:0;background:#000;transition:background-color .08s linear}#onboarding{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;transition:background-color .18s ease;z-index:100}.ob-title{font-size:44px;font-weight:900;background:linear-gradient(135deg,#FF006E,#8338EC,#3A86FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.ob-sub{font-size:15px;color:rgba(255,255,255,.65);font-weight:300}.ob-number{width:76px;height:76px;border-radius:50%;border:2px solid rgba(255,0,110,.4);display:flex;align-items:center;justify-content:center;animation:glow 2s ease-in-out infinite;margin-bottom:12px}.ob-number span{font-size:26px;font-weight:900;color:#FF006E}.ob-tap{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;background:linear-gradient(90deg,rgba(255,255,255,.1),rgba(255,255,255,.3),rgba(255,255,255,.1));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}#msgOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;pointer-events:none}#msgOverlay.show{display:flex}.msg-bubble{padding:14px 24px;border-radius:18px;max-width:85%;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(16px);text-align:center;animation:popIn .35s ease-out}.msg-bubble.shoutout{padding:22px 32px;background:linear-gradient(135deg,rgba(255,215,0,.25),rgba(255,20,147,.15));border:2px solid rgba(255,215,0,.5)}.msg-text{font-size:18px;font-weight:800;color:#fff}.msg-bubble.shoutout .msg-text{font-size:26px;color:#FFD700}.msg-from{font-size:9px;color:rgba(255,215,0,.5);letter-spacing:4px;text-transform:uppercase;margin-top:6px}#errorScreen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;color:#fff;z-index:300;text-align:center;padding:24px}</style></head><body oncontextmenu="return false"><div id="errorScreen"><div style="font-size:48px;margin-bottom:16px">😵</div><div style="font-size:18px;font-weight:700;margin-bottom:8px" id="errorTitle">Room not found</div><div style="font-size:13px;color:#888" id="errorMsg">Check your room code and try again.</div><a href="index.html" style="margin-top:24px;color:#3A86FF;font-size:14px;font-weight:600;text-decoration:none">← Back</a></div><div id="onboarding"><div id="obContent" style="text-align:center;animation:fadeUp .7s ease-out"></div></div><div id="msgOverlay"><div class="msg-bubble" id="msgBubble"><div class="msg-text" id="msgText"></div><div class="msg-from" id="msgFrom" style="display:none">FROM THE DJ</div></div></div><script type="module">import{SyncEngine}from'./js/sync-engine.js';import{getColor}from'./js/patterns.js';const params=new URLSearchParams(window.location.search);const roomCode=params.get('room')?.toUpperCase();if(!roomCode||roomCode.length!==4){document.getElementById('errorScreen').style.display='flex'}let engine=null,patState={pattern:'solid',theme:'neon',bpm:120,startTime:Date.now()},spotlit=false,spotTimer=null,animFrame=null,msgTimer=null,deviceNumber=0,totalDevices=0;const obEl=document.getElementById('onboarding'),obContent=document.getElementById('obContent');function onboardPhase0(){obContent.innerHTML='<div class="ob-title">SyncParty</div><div class="ob-sub">Your phone is now part of the show</div>'}function onboardPhase1(){obContent.innerHTML='<div style="font-size:56px;margin-bottom:12px">✨</div><div style="font-size:13px;color:rgba(255,255,255,.85);letter-spacing:4px;text-transform:uppercase">Get ready...</div>';const colors=['#FF006E','#8338EC','#3A86FF','#06D6A0','#FFD700','#FF4500','#00FFFF'];let step=0;const iv=setInterval(()=>{obEl.style.backgroundColor=colors[step%colors.length];step++;if(step>10){clearInterval(iv);obEl.style.backgroundColor='#000';onboardPhase2()}},250)}function onboardPhase2(){obContent.style.animation='fadeUp .6s ease-out';obContent.innerHTML='<div class="ob-number"><span>#'+(deviceNumber||'?')+'</span></div><div style="font-size:12px;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase">Light '+deviceNumber+' of '+(totalDevices||'...')+'</div><div style="font-size:15px;color:#fff;font-weight:600;margin:12px 0 20px">You\'re connected!</div><div class="ob-tap">Tap anywhere to go fullscreen</div>';obEl.style.cursor='pointer';obEl.onclick=enterLightMode}function enterLightMode(){obEl.style.display='none';try{document.documentElement.requestFullscreen?.()}catch(e){}try{navigator.wakeLock?.request('screen')}catch(e){}startAnimation()}function startAnimation(){function frame(){if(!spotlit){const color=getColor(patState.pattern,patState.theme,patState.bpm,patState.startTime);document.body.style.backgroundColor=color;document.body.style.transition=patState.pattern==='strobe'?'none':'background-color .08s linear'}animFrame=requestAnimationFrame(frame)}animFrame=requestAnimationFrame(frame)}function showMsg(text,kind){const o=document.getElementById('msgOverlay'),b=document.getElementById('msgBubble'),t=document.getElementById('msgText'),f=document.getElementById('msgFrom');t.textContent=text;b.className=kind==='shoutout'?'msg-bubble shoutout':'msg-bubble';f.style.display=kind==='shoutout'?'block':'none';o.classList.add('show');if(msgTimer)clearTimeout(msgTimer);msgTimer=setTimeout(()=>o.classList.remove('show'),3500)}async function connect(){try{engine=new SyncEngine;engine.onMessage=(event,data)=>{switch(event){case'sync':patState={pattern:data.pattern,theme:data.theme,bpm:data.bpm,startTime:data.startTime};break;case'flash':document.body.style.transition='none';document.body.style.backgroundColor='#FFF';setTimeout(()=>{document.body.style.backgroundColor='#000'},100);break;case'blackout':patState={...patState,pattern:'solid'};document.body.style.backgroundColor='#000';spotlit=false;break;case'message':showMsg(data.text,data.msgKind||'instruction');break;case'spotlight':if(data.target===engine.deviceId){spotlit=true;document.body.style.transition='background-color .3s ease';document.body.style.backgroundColor=data.color||'#FFD700';showMsg('SPOTLIGHT ON YOU','shoutout');if(spotTimer)clearTimeout(spotTimer);spotTimer=setTimeout(()=>{spotlit=false},data.duration||5000)}break;case'shoutout':if(data.target===engine.deviceId)showMsg(data.text,'shoutout');break;case'device_count':totalDevices=data.total;break}};const result=await engine.joinRoom(roomCode);deviceNumber=result.deviceNumber;totalDevices=deviceNumber}catch(e){console.error('Join failed:',e);document.getElementById('errorScreen').style.display='flex';document.getElementById('errorMsg').textContent='Could not find room "'+roomCode+'".'}}async function boot(){onboardPhase0();const cp=connect();setTimeout(()=>onboardPhase1(),2500);setTimeout(async()=>{await cp;onboardPhase2()},5500)}if(roomCode)boot();</script></body></html>
