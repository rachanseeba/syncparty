<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>SyncParty DJ</title><link rel="stylesheet" href="css/styles.css"><meta name="theme-color" content="#0a0a0f"><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><style>body{min-height:100vh;background:linear-gradient(135deg,#0a0a0f,#1a1a2e 50%,#0a0a0f);color:#fff;padding:20px 16px 40px;overflow-y:auto;position:static}html{overflow-y:auto;position:static}.sl{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#555;margin-bottom:8px;padding-left:2px}.sec{margin-bottom:18px}.header{text-align:center;margin-bottom:24px}.hb{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:#666}.ht{font-size:26px;font-weight:800;background:linear-gradient(90deg,#FF006E,#8338EC,#3A86FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.rb{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}.rb .rl{font-size:10px;color:#888;letter-spacing:2px}.rb .rc{font-size:18px;font-weight:800;letter-spacing:6px}.rb .dot{width:8px;height:8px;border-radius:50%;background:#06D6A0;box-shadow:0 0 8px #06D6A0}.rb .dc{font-size:11px;color:#06D6A0}.bpm-btn{width:86px;height:86px;border-radius:50%;border:2px solid rgba(255,0,110,.4);background:radial-gradient(circle,rgba(255,0,110,.15),transparent 70%);color:#FF006E;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;margin:0 auto;transition:transform .1s}.bpm-btn:active{transform:scale(.9)}.bv{font-size:22px;font-weight:800}.bl{font-size:7px;letter-spacing:3px;text-transform:uppercase;opacity:.6}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pb,.tb,.ab,.qb{border-radius:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}.pb:active,.tb:active,.ab:active,.qb:active{transform:scale(.95)}.pb{padding:12px 4px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:#888;display:flex;flex-direction:column;align-items:center;gap:4px}.pb.a{border-color:rgba(255,0,110,.6);background:linear-gradient(135deg,rgba(255,0,110,.2),rgba(131,56,236,.15));color:#fff}.pb .i{font-size:18px}.pb .n{font-size:9px;font-weight:600;letter-spacing:1px}.tb{padding:10px 8px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);display:flex;flex-direction:column;align-items:center;gap:6px}.tb.a{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)}.td{display:flex;gap:3px}.tdt{width:13px;height:13px;border-radius:50%}.tn{font-size:9px;font-weight:600;letter-spacing:1px;color:#666}.tb.a .tn{color:#ccc}.ab{padding:14px;font-size:13px;font-weight:600;letter-spacing:2px}.fb{border:1px solid rgba(255,255,255,.15);background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.05));color:#fff}.bb{border:1px solid rgba(255,0,0,.2);background:linear-gradient(135deg,rgba(255,0,0,.1),rgba(0,0,0,.3));color:#ff4444}.mt{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(131,56,236,.3);background:rgba(131,56,236,.05);color:#8338EC;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;letter-spacing:2px;margin-bottom:8px}.mt.open{background:rgba(131,56,236,.15)}.mp{display:none;animation:fadeIn .3s ease-out}.mp.show{display:block}.qb{padding:10px 8px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#ccc;font-size:11px;font-weight:600}.mir{display:flex;gap:6px;margin-top:8px}.mi{flex:1;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff;font-size:13px;font-family:'Outfit',sans-serif;outline:none}.mi:focus{border-color:rgba(131,56,236,.4)}.ms{padding:10px 16px;border-radius:10px;border:1px solid rgba(131,56,236,.3);background:rgba(131,56,236,.15);color:#8338EC;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer}.dl{display:flex;flex-wrap:wrap;gap:8px}.dc2{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);cursor:pointer;transition:all .2s}.dc2.sel{border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.1)}.dc2 .dot{width:8px;height:8px;border-radius:50%;background:#06D6A0}.dc2 .num{font-size:11px;font-weight:600;color:#aaa}.dc2 .did{font-size:9px;color:#555}.da{display:none;gap:6px;margin-top:8px;animation:fadeIn .2s ease-out}.da.show{display:flex}.dab{flex:1;padding:10px;border-radius:10px;font-size:11px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer}.sb{border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.1);color:#FFD700}.sob{border:1px solid rgba(255,0,110,.3);background:rgba(255,0,110,.1);color:#FF006E}.de{padding:20px;border-radius:12px;border:1px dashed rgba(255,255,255,.08);text-align:center;font-size:12px;color:#555}.qs{text-align:center;margin-top:8px}#qrcode{display:inline-block;padding:12px;background:#fff;border-radius:12px}.qu{font-size:10px;color:#555;margin-top:8px;word-break:break-all}.ft{text-align:center;padding:14px 0;margin-top:12px;border-top:1px solid rgba(255,255,255,.04);font-size:8px;color:#333;letter-spacing:2px}#lo{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;color:#fff}</style></head><body><div id="lo"><div style="font-size:32px;margin-bottom:12px">🎧</div><div style="font-size:14px;color:#888">Connecting to room...</div></div><div id="main" style="display:none"><div class="header"><div class="hb">SYNCPARTY</div><div class="ht">DJ Control</div><div class="rb"><span class="rl">ROOM</span><span class="rc" id="rcd">----</span><span class="dot"></span><span class="dc" id="dcd">0</span></div></div><div class="sec" style="text-align:center;margin-bottom:20px"><button class="bpm-btn" id="bpmBtn"><span class="bv" id="bpmVal">128</span><span class="bl">TAP BPM</span></button></div><div class="sec"><div class="sl">PATTERNS</div><div class="g4" id="pg"></div></div><div class="sec"><div class="sl">COLOR THEME</div><div class="g3" id="tg"></div></div><div class="sec"><div class="sl">QUICK ACTIONS</div><div class="g2"><button class="ab fb" id="flB">⚡ FLASH</button><button class="ab bb" id="blB">🔲 BLACKOUT</button></div></div><div class="sec"><div class="sl">DJ → CROWD</div><button class="mt" id="mtB">💬 SEND MESSAGE</button><div class="mp" id="mpE"><div class="g2" id="qmg" style="margin-bottom:8px"></div><div class="mir"><input type="text" class="mi" id="cmi" placeholder="Type a message..." maxlength="100" autocomplete="off"><button class="ms" id="cms">SEND</button></div></div></div><div class="sec"><div class="sl" id="cl">CROWD (0)</div><div id="dvl"></div><div class="da" id="dva"><button class="dab sb" id="spB">🌟 SPOTLIGHT</button><button class="dab sob" id="shB">🔥 SHOUTOUT</button></div></div><div class="sec"><div class="sl">SHARE WITH CROWD</div><div class="qs"><div id="qrcode"></div><div class="qu" id="qrUrl"></div></div></div><div class="ft">SYNCPARTY MVP</div></div><script type="module">import{SyncEngine}from'./js/sync-engine.js';import{PATTERNS,THEMES}from'./js/patterns.js';const QM=['PHONES UP ☝️','HANDS IN THE AIR 🙌','MAKE SOME NOISE 📢','POINT TO THE FLOOR ⬇️','SCREAM! 🗣️',"LET'S GO 🚀"];const params=new URLSearchParams(window.location.search);const roomCode=params.get('room')?.toUpperCase();if(!roomCode)window.location.href='index.html';let engine=null,curPat='solid',curTheme='neon',bpm=128,taps=[],devices=[],selDev=null,syncIv=null,pollIv=null;const $=id=>document.getElementById(id);Object.entries(PATTERNS).forEach(([k,p])=>{const b=document.createElement('button');b.className='pb'+(k===curPat?' a':'');b.dataset.key=k;b.innerHTML='<span class="i">'+p.icon+'</span><span class="n">'+p.name+'</span>';b.onclick=()=>setPat(k);$('pg').appendChild(b)});Object.entries(THEMES).forEach(([k,t])=>{const b=document.createElement('button');b.className='tb'+(k===curTheme?' a':'');b.dataset.key=k;b.innerHTML='<div class="td">'+t.colors.map(c=>'<div class="tdt" style="background:'+c+'"></div>').join('')+'</div><span class="tn">'+t.name+'</span>';b.onclick=()=>setThm(k);$('tg').appendChild(b)});QM.forEach(m=>{const b=document.createElement('button');b.className='qb';b.textContent=m;b.onclick=()=>sendMsg(m);$('qmg').appendChild(b)});function bc(){engine?.broadcastSync({pattern:curPat,theme:curTheme,bpm})}function setPat(k){curPat=k;$('pg').querySelectorAll('.pb').forEach(b=>b.classList.toggle('a',b.dataset.key===k));bc()}function setThm(k){curTheme=k;$('tg').querySelectorAll('.tb').forEach(b=>b.classList.toggle('a',b.dataset.key===k));bc()}$('bpmBtn').onclick=()=>{const now=Date.now();taps=[...taps,now].slice(-8);if(taps.length>=2){const ivs=taps.slice(1).map((t,i)=>t-taps[i]);const avg=ivs.reduce((a,b)=>a+b,0)/ivs.length;const d=Math.round(60000/avg);if(d>40&&d<300){bpm=d;$('bpmVal').textContent=bpm;bc()}}};$('flB').onclick=()=>engine?.send('flash',{});$('blB').onclick=()=>engine?.send('blackout',{});const mtB=$('mtB'),mpE=$('mpE');mtB.onclick=()=>{const o=mpE.classList.toggle('show');mtB.classList.toggle('open',o);mtB.textContent=o?'💬 HIDE MESSAGES':'💬 SEND MESSAGE'};function sendMsg(t){engine?.send('message',{text:t,msgKind:'instruction'})}$('cms').onclick=()=>{if($('cmi').value.trim()){sendMsg($('cmi').value.trim());$('cmi').value=''}};$('cmi').onkeydown=e=>{if(e.key==='Enter'&&$('cmi').value.trim()){sendMsg($('cmi').value.trim());$('cmi').value=''}};function selDevice(id){selDev=selDev===id?null:id;renderDevs()}$('spB').onclick=()=>{if(selDev)engine?.send('spotlight',{target:selDev,color:'#FFD700',duration:5000})};$('shB').onclick=()=>{if(selDev)engine?.send('shoutout',{target:selDev,text:"🔥 YOU'RE KILLING IT"})};function renderDevs(){$('cl').textContent='CROWD ('+devices.length+')';$('dcd').textContent=devices.length;if(!devices.length){$('dvl').innerHTML='<div class="de">Waiting for devices...<br><span style="font-size:10px;color:#333">Share code: '+roomCode+'</span></div>';$('dva').classList.remove('show');return}$('dvl').innerHTML='';const l=document.createElement('div');l.className='dl';devices.forEach(d=>{const c=document.createElement('div');c.className='dc2'+(selDev===d.device_id?' sel':'');c.innerHTML='<div class="dot"></div><span class="num">#'+d.device_number+'</span><span class="did">'+d.device_id+'</span>';c.onclick=()=>selDevice(d.device_id);l.appendChild(c)});$('dvl').appendChild(l);$('dva').classList.toggle('show',!!selDev)}function genQR(){const base=window.location.origin+window.location.pathname.replace('host.html','');const url=base+'crowd.html?room='+roomCode;$('qrUrl').textContent=url;const el=$('qrcode');el.innerHTML='';try{new QRCode(el,{text:url,width:160,height:160,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M})}catch(e){el.innerHTML='<div style="padding:20px;font-size:12px;color:#888">QR failed</div>'}}async function init(){try{engine=new SyncEngine;engine.onMessage=(ev,data)=>{if(ev==='join'){refreshDevs();engine.send('device_count',{total:devices.length+1})}};await engine.createRoom(roomCode);$('rcd').textContent=roomCode;syncIv=setInterval(bc,2000);refreshDevs();pollIv=setInterval(refreshDevs,10000);genQR();$('lo').style.display='none';$('main').style.display='block'}catch(e){console.error(e);$('lo').innerHTML='<div style="text-align:center;padding:24px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Connection Failed</div><div style="font-size:13px;color:#888">'+e.message+'</div><a href="index.html" style="display:block;margin-top:24px;color:#3A86FF;font-size:14px;text-decoration:none">← Back</a></div>'}}async function refreshDevs(){if(!engine)return;devices=await engine.getDevices();renderDevs()}window.addEventListener('beforeunload',()=>{if(syncIv)clearInterval(syncIv);if(pollIv)clearInterval(pollIv);engine?.destroy()});init();</script></body></html>
